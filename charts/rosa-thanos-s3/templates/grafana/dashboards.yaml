{{ range $path, $_ := .Files.Glob "files/dashboards/*.json" }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ base $path }}
  labels:
    app: grafana
spec:
  instanceSelector:
    matchLabels:
      app.kubernetes.io/name: grafana-cr
      app.kubernetes.io/instance: {{ $.Release.Name }}
  json: {{ $.Files.Get $path }}
{{ end }}
